<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>ask485 system architecture</title>
<style>
  text { font-family: sans-serif; fill: #1a1a1a; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; fill: #555; }
  .box-gray { fill: #f5f5f3; stroke: #bbb; }
  .box-blue { fill: #e6f1fb; stroke: #378add; }
  .box-teal { fill: #e1f5ee; stroke: #1d9e75; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<!-- User -->
<rect class="box-gray" x="270" y="20" width="140" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">User</text>
<text class="ts" x="340" y="60" text-anchor="middle" dominant-baseline="central">Web browser</text>
<!-- query arrow down -->
<line x1="340" y1="76" x2="340" y2="118" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<text class="ts" x="356" y="102" dominant-baseline="central" fill="#BA7517">query</text>
<!-- results arrow up -->
<line x1="326" y1="118" x2="326" y2="76" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<text class="ts" x="206" y="100" dominant-baseline="central" fill="#0F6E56">ranked results</text>
<!-- Search Server -->
<rect class="box-blue" x="210" y="118" width="260" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="142" text-anchor="middle" dominant-baseline="central">Search Server</text>
<text class="ts" x="340" y="162" text-anchor="middle" dominant-baseline="central">Aggregates, ranks top 10 · port 8000</text>
<!-- Arrows to index servers -->
<path d="M270 188 L140 248" stroke="#888" stroke-width="1" marker-end="url(#arrow)" fill="none" opacity="0.7"/>
<line x1="340" y1="188" x2="340" y2="248" stroke="#888" stroke-width="1" marker-end="url(#arrow)" fill="none" opacity="0.7"/>
<path d="M410 188 L540 248" stroke="#888" stroke-width="1" marker-end="url(#arrow)" fill="none" opacity="0.7"/>
<text class="ts" x="340" y="224" text-anchor="middle">parallel REST API calls</text>
<!-- Index Server 0 -->
<rect class="box-teal" x="50" y="248" width="180" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="140" y="272" text-anchor="middle" dominant-baseline="central">Index Server 0</text>
<text class="ts" x="140" y="292" text-anchor="middle" dominant-baseline="central">inverted_index_0 · 9000</text>
<!-- Index Server 1 -->
<rect class="box-teal" x="250" y="248" width="180" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="272" text-anchor="middle" dominant-baseline="central">Index Server 1</text>
<text class="ts" x="340" y="292" text-anchor="middle" dominant-baseline="central">inverted_index_1 · 9001</text>
<!-- Index Server 2 -->
<rect class="box-teal" x="450" y="248" width="180" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="540" y="272" text-anchor="middle" dominant-baseline="central">Index Server 2</text>
<text class="ts" x="540" y="292" text-anchor="middle" dominant-baseline="central">inverted_index_2 · 9002</text>
<!-- Files -->
<rect class="box-gray" x="50" y="348" width="180" height="44" rx="8" stroke-width="0.5"/>
<text class="ts" x="140" y="370" text-anchor="middle" dominant-baseline="central">inverted_index_0.txt</text>
<rect class="box-gray" x="250" y="348" width="180" height="44" rx="8" stroke-width="0.5"/>
<text class="ts" x="340" y="370" text-anchor="middle" dominant-baseline="central">inverted_index_1.txt</text>
<rect class="box-gray" x="450" y="348" width="180" height="44" rx="8" stroke-width="0.5"/>
<text class="ts" x="540" y="370" text-anchor="middle" dominant-baseline="central">inverted_index_2.txt</text>
<!-- Arrows to files -->
<line x1="140" y1="318" x2="140" y2="348" stroke="#888" stroke-width="1" marker-end="url(#arrow)" fill="none" opacity="0.5"/>
<line x1="340" y1="318" x2="340" y2="348" stroke="#888" stroke-width="1" marker-end="url(#arrow)" fill="none" opacity="0.5"/>
<line x1="540" y1="318" x2="540" y2="348" stroke="#888" stroke-width="1" marker-end="url(#arrow)" fill="none" opacity="0.5"/>
</svg>
